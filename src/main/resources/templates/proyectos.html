<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Proyectos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/proyectos.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Sistema de Gestión</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/usuarios}">👥 Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/proyectos}">📁 Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/hitos}">🎯 Hitos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/actividades}">✅ Actividades</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/registros}">⏱️ Registros</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">📁 Gestión de Proyectos</h1>
        
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-white bg-success stat-card">
                    <div class="card-body text-center">
                        <h3 id="totalProyectos">0</h3>
                        <p class="mb-0">Total Proyectos</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">➕ Crear Nuevo Proyecto</h5>
            </div>
            <div class="card-body">
                <form id="formProyecto">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre del Proyecto:</label>
                        <input type="text" class="form-control" id="nombre" required>
                    </div>
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción:</label>
                        <textarea class="form-control" id="descripcion" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fechaInicio" class="form-label">Fecha Inicio:</label>
                            <input type="date" class="form-control" id="fechaInicio" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="fechaFin" class="form-label">Fecha Fin:</label>
                            <input type="date" class="form-control" id="fechaFin" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Crear Proyecto</button>
                </form>
            </div>
        </div>
        
        <div class="card mb-3">
            <div class="card-body">
                <input type="text" id="searchInput" class="form-control" placeholder="🔍 Buscar proyectos...">
            </div>
        </div>
        
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">📋 Lista de Proyectos</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Inicio</th><th>Fin</th><th>Estado</th><th>Acciones</th</thead>
                        <tbody id="tablaProyectos">
                            <tr><td colspan="7" class="text-center">Cargando proyectos...</td</tbody>
                     </table>
                </div>
            </div>
        </div>
        
        <div class="card mt-3">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-3">
                        <label class="form-label">Mostrar:</label>
                        <select id="tamanioPagina" class="form-select">
                            <option value="5">5 proyectos</option>
                            <option value="10" selected>10 proyectos</option>
                            <option value="20">20 proyectos</option>
                            <option value="50">50 proyectos</option>
                        </select>
                    </div>
                    <div class="col-md-9">
                        <div id="paginationControls"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">✏️ Editar Proyecto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label for="editNombre" class="form-label">Nombre:</label>
                        <input type="text" class="form-control" id="editNombre" required>
                    </div>
                    <div class="mb-3">
                        <label for="editDescripcion" class="form-label">Descripción:</label>
                        <textarea class="form-control" id="editDescripcion" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="editFechaInicio" class="form-label">Fecha Inicio:</label>
                            <input type="date" class="form-control" id="editFechaInicio" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="editFechaFin" class="form-label">Fecha Fin:</label>
                            <input type="date" class="form-control" id="editFechaFin" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="actualizarProyecto()">Guardar</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/proyectos.js}"></script>
</body>
</html>
