<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Registros de Horas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Propios -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/registros.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Sistema de Gestión</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/usuarios}">👥 Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/proyectos}">📁 Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/hitos}">🎯 Hitos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/actividades}">✅ Actividades</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/registros}">⏱️ Registros</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">⏱️ Gestión de Registros de Horas</h1>
        
        <!-- Tarjetas de estadísticas -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stat-card text-white">
                    <div class="card-body text-center">
                        <h3 id="totalRegistros">0</h3>
                        <p class="mb-0">Total Registros</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card text-white">
                    <div class="card-body text-center">
                        <h3 id="totalHoras">0</h3>
                        <p class="mb-0">Horas Totales</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Formulario Registrar Horas -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">➕ Registrar Horas Trabajadas</h5>
            </div>
            <div class="card-body">
                <form id="formRegistro">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="actividadId" class="form-label">Actividad:</label>
                            <select class="form-select" id="actividadId" required>
                                <option value="">Seleccionar actividad</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="usuarioId" class="form-label">Usuario:</label>
                            <select class="form-select" id="usuarioId" required>
                                <option value="">Seleccionar usuario</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="horasTrabajadas" class="form-label">Horas Trabajadas:</label>
                            <input type="number" step="0.5" class="form-control" id="horasTrabajadas" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="fechaRegistro" class="form-label">Fecha:</label>
                            <input type="date" class="form-control" id="fechaRegistro" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Registrar Horas</button>
                </form>
            </div>
        </div>
        
        <!-- Lista de Registros -->
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">📋 Lista de Registros de Horas</h5>
            </div>
            <div class="card-body">
                <!-- Resumen Semanal -->
                <div id="resumenSemanal" class="resumen-semanal mb-3"></div>
                <!-- Lista de Registros -->
                <div id="listaRegistros" class="registros-list"></div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/registros.js}"></script>
</body>
</html>
