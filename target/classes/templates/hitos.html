<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Proyectos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Sistema de Gestión</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/usuarios}">👥 Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/proyectos}">📁 Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/hitos}">🎯 Hitos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/actividades}">✅ Actividades</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/registros}">⏱️ Registros</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="hero-section text-center p-5 mb-4 rounded bg-primary text-white">
            <h1 class="display-4">📊 Sistema de Gestión de Proyectos</h1>
            <p class="lead">Administra tus proyectos, hitos, actividades y controla las horas trabajadas</p>
        </div>

        <!-- Tarjetas centradas -->
        <div class="dashboard-wrapper">
            <div class="row justify-content-center g-4">
                <!-- Usuarios -->
                <div class="col-6 col-md-4 col-lg-2 dashboard-col">
                    <a th:href="@{/usuarios}" class="text-decoration-none">
                        <div class="card dashboard-card text-center">
                            <div class="card-body">
                                <div class="display-1">👥</div>
                                <h3 id="totalUsuariosDashboard" class="card-title mt-2">0</h3>
                                <p class="card-text text-muted">Usuarios</p>
                            </div>
                        </div>
                    </a>
                </div>
                <!-- Proyectos -->
                <div class="col-6 col-md-4 col-lg-2 dashboard-col">
                    <a th:href="@{/proyectos}" class="text-decoration-none">
                        <div class="card dashboard-card text-center">
                            <div class="card-body">
                                <div class="display-1">📁</div>
                                <h3 id="totalProyectosDashboard" class="card-title mt-2">0</h3>
                                <p class="card-text text-muted">Proyectos</p>
                            </div>
                        </div>
                    </a>
                </div>
                <!-- Hitos -->
                <div class="col-6 col-md-4 col-lg-2 dashboard-col">
                    <a th:href="@{/hitos}" class="text-decoration-none">
                        <div class="card dashboard-card text-center">
                            <div class="card-body">
                                <div class="display-1">🎯</div>
                                <h3 id="totalHitosDashboard" class="card-title mt-2">0</h3>
                                <p class="card-text text-muted">Hitos</p>
                            </div>
                        </div>
                    </a>
                </div>
                <!-- Actividades -->
                <div class="col-6 col-md-4 col-lg-2 dashboard-col">
                    <a th:href="@{/actividades}" class="text-decoration-none">
                        <div class="card dashboard-card text-center">
                            <div class="card-body">
                                <div class="display-1">✅</div>
                                <h3 id="totalActividadesDashboard" class="card-title mt-2">0</h3>
                                <p class="card-text text-muted">Actividades</p>
                            </div>
                        </div>
                    </a>
                </div>
                <!-- Registros -->
                <div class="col-6 col-md-4 col-lg-2 dashboard-col">
                    <a th:href="@{/registros}" class="text-decoration-none">
                        <div class="card dashboard-card text-center">
                            <div class="card-body">
                                <div class="display-1">⏱️</div>
                                <h3 id="totalRegistrosDashboard" class="card-title mt-2">0</h3>
                                <p class="card-text text-muted">Registros</p>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:8080';
        const auth = btoa('admin:admin123');

        async function cargarDashboard() {
            try {
                const [usuarios, proyectos, hitos, actividades, registros] = await Promise.all([
                    fetch(`${API_URL}/usuarios/paginated?page=0&size=1`, { headers: { 'Authorization': `Basic ${auth}` } }).then(r => r.json()),
                    fetch(`${API_URL}/proyectos/paginated?page=0&size=1`, { headers: { 'Authorization': `Basic ${auth}` } }).then(r => r.json()),
                    fetch(`${API_URL}/hitos/paginated?page=0&size=1`, { headers: { 'Authorization': `Basic ${auth}` } }).then(r => r.json()),
                    fetch(`${API_URL}/actividades/paginated?page=0&size=1`, { headers: { 'Authorization': `Basic ${auth}` } }).then(r => r.json()),
                    fetch(`${API_URL}/registros/paginated?page=0&size=1`, { headers: { 'Authorization': `Basic ${auth}` } }).then(r => r.json())
                ]);

                document.getElementById('totalUsuariosDashboard').textContent = usuarios.totalElementos || 0;
                document.getElementById('totalProyectosDashboard').textContent = proyectos.totalElementos || 0;
                document.getElementById('totalHitosDashboard').textContent = hitos.totalElementos || 0;
                document.getElementById('totalActividadesDashboard').textContent = actividades.totalElementos || 0;
                document.getElementById('totalRegistrosDashboard').textContent = registros.totalElementos || 0;
            } catch (error) {
                console.error('Error cargando dashboard:', error);
            }
        }

        cargarDashboard();
    </script>
</body>
</html>
