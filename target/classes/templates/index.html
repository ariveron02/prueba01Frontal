<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Proyectos</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Propio -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Sistema de Gestión</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/usuarios}">👥 Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/proyectos}">📁 Proyectos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/hitos}">🎯 Hitos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/actividades}">✅ Actividades</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/registros}">⏱️ Registros</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="hero-section text-center p-5 mb-4 rounded">
            <h1 class="display-4">📊 Sistema de Gestión de Proyectos</h1>
            <p class="lead">Administra tus proyectos, hitos, actividades y controla las horas trabajadas</p>
        </div>

        <div class="row g-4">
            <div class="col-md-3">
                <a th:href="@{/usuarios}" class="text-decoration-none">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <div class="display-1">👥</div>
                            <h3 id="totalUsuariosDashboard" class="card-title mt-2">0</h3>
                            <p class="card-text text-muted">Usuarios Registrados</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a th:href="@{/proyectos}" class="text-decoration-none">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <div class="display-1">📁</div>
                            <h3 id="totalProyectosDashboard" class="card-title mt-2">0</h3>
                            <p class="card-text text-muted">Proyectos Activos</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a th:href="@{/hitos}" class="text-decoration-none">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <div class="display-1">🎯</div>
                            <h3 id="totalHitosDashboard" class="card-title mt-2">0</h3>
                            <p class="card-text text-muted">Hitos</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a th:href="@{/actividades}" class="text-decoration-none">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <div class="display-1">✅</div>
                            <h3 id="totalActividadesDashboard" class="card-title mt-2">0</h3>
                            <p class="card-text text-muted">Actividades</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:8080';
        const auth = btoa('admin:admin123');

        async function cargarDashboard() {
            try {
                const [usuarios, proyectos, hitos, actividades] = await Promise.all([
                    fetch(`${API_URL}/usuarios`, { headers: { 'Authorization': `Basic ${auth}` } }).then(r => r.json()),
                    fetch(`${API_URL}/proyectos`, { headers: { 'Authorization': `Basic ${auth}` } }).then(r => r.json()),
                    fetch(`${API_URL}/hitos`, { headers: { 'Authorization': `Basic ${auth}` } }).then(r => r.json()),
                    fetch(`${API_URL}/actividades`, { headers: { 'Authorization': `Basic ${auth}` } }).then(r => r.json())
                ]);

                document.getElementById('totalUsuariosDashboard').textContent = usuarios.length;
                document.getElementById('totalProyectosDashboard').textContent = proyectos.length;
                document.getElementById('totalHitosDashboard').textContent = hitos.length;
                document.getElementById('totalActividadesDashboard').textContent = actividades.length;
            } catch (error) {
                console.error('Error cargando dashboard:', error);
            }
        }

        cargarDashboard();
    </script>
</body>
</html>
