<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/usuarios.css}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">Sistema de Gestión</a>
            <div class="nav-links">
                <a class="nav-link" href="/usuarios">Usuarios</a>
                <a class="nav-link" href="/proyectos">Proyectos</a>
                <a class="nav-link" href="/hitos">Hitos</a>
                <a class="nav-link" href="/actividades">Actividades</a>
                <a class="nav-link" href="/registros">Registros</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>👥 Gestión de Usuarios</h1>
        
        <!-- Estadísticas -->
        <div class="usuarios-stats">
            <div class="stat-card">
                <h3 id="totalUsuarios">0</h3>
                <p>Total Usuarios</p>
            </div>
        </div>
        
        <!-- Formulario Crear Usuario -->
        <div class="card">
            <div class="card-header">
                <h3>➕ Crear Nuevo Usuario</h3>
            </div>
            <div class="card-body">
                <form id="formUsuario">
                    <div class="form-group">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="correo">Correo Electrónico:</label>
                        <input type="email" id="correo" name="correo" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Crear Usuario</button>
                </form>
            </div>
        </div>
        
        <!-- Buscador -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Buscar usuarios...">
        </div>
        
        <!-- Tabla de Usuarios -->
        <div class="card">
            <div class="card-header">
                <h3>📋 Lista de Usuarios</h3>
            </div>
            <div class="card-body">
                <div class="table-container">
                    <table id="tablaUsuarios">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4" class="text-center">Cargando usuarios...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal Editar Usuario -->
    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ Editar Usuario</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editNombre">Nombre:</label>
                    <input type="text" id="editNombre" required>
                </div>
                <div class="form-group">
                    <label for="editCorreo">Correo Electrónico:</label>
                    <input type="email" id="editCorreo" required>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="actualizarUsuario()">Guardar</button>
                <button class="btn" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/usuarios.js}"></script>
</body>
</html>
