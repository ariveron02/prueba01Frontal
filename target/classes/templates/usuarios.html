<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Propios -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/usuarios.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Sistema de Gestión</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" th:href="@{/usuarios}">👥 Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/proyectos}">📁 Proyectos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/hitos}">🎯 Hitos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/actividades}">✅ Actividades</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/registros}">⏱️ Registros</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">👥 Gestión de Usuarios</h1>
        
        <!-- Tarjeta de estadísticas -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-white bg-primary stat-card">
                    <div class="card-body text-center">
                        <h3 id="totalUsuarios">0</h3>
                        <p class="mb-0">Total Usuarios</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Formulario Crear Usuario -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">➕ Crear Nuevo Usuario</h5>
            </div>
            <div class="card-body">
                <form id="formUsuario">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">Nombre:</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="correo" class="form-label">Correo Electrónico:</label>
                            <input type="email" class="form-control" id="correo" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Crear Usuario</button>
                </form>
            </div>
        </div>
        
        <!-- Tabla de Usuarios -->
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">📋 Lista de Usuarios</h5>
            </div>
            <div class="card-body">
                <input type="text" id="searchInput" class="form-control mb-3" placeholder="🔍 Buscar usuarios...">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Acciones</th</thead>
                        <tbody id="tablaUsuarios">
                            <tr><td colspan="4" class="text-center">Cargando usuarios...</td</tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <!-- Controles de paginación -->
    <div class="card mt-3">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-3">
                    <label class="form-label">Mostrar:</label>
                    <select id="tamanioPagina" class="form-select">
                        <option value="5">5 usuarios</option>
                        <option value="10" selected>10 usuarios</option>
                        <option value="20">20 usuarios</option>
                        <option value="50">50 usuarios</option>
                    </select>
                </div>
                <div class="col-md-9">
                    <div id="paginationControls"></div>
                </div>
            </div>
        </div>
    </div>    
    <!-- Modal Editar Usuario -->
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">✏️ Editar Usuario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label for="editNombre" class="form-label">Nombre:</label>
                        <input type="text" class="form-control" id="editNombre" required>
                    </div>
                    <div class="mb-3">
                        <label for="editCorreo" class="form-label">Correo:</label>
                        <input type="email" class="form-control" id="editCorreo" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="actualizarUsuario()">Guardar</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS (necesario para modales) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Tu JavaScript con la lógica CRUD -->
    <script th:src="@{/js/usuarios.js}"></script>
</body>
</html>
